name: Bootstrap roadmap issues

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-roadmap-issues.yml

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Create roadmap issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const labelsToEnsure = [
              { name: 'fachkonzept', color: '1D76DB', description: 'Konkretes fachliches Arbeits-Issue' },
              { name: 'leit-issue', color: '5319E7', description: 'Strukturiert einen später zu detaillierenden Themenbereich' }
            ];

            const existingLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner, repo, per_page: 100
            });
            for (const label of labelsToEnsure) {
              if (!existingLabels.some(item => item.name === label.name)) {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            const milestones = await github.paginate(github.rest.issues.listMilestones, {
              owner, repo, state: 'all', per_page: 100
            });
            const milestoneByTitle = new Map(milestones.map(item => [item.title, item]));

            const workBody = item => `## Ziel\n${item.goal}\n\n## Abgrenzung\n${item.scope}\n\n## Erwartete Ergebnisse\n${item.outputs.map(value => `- ${value}`).join('\n')}\n\n## Akzeptanzkriterien\n${item.criteria.map(value => `- [ ] ${value}`).join('\n')}\n\n## Hinweise\n- Die passende Vorlage unter \`templates/\` verwenden.\n- Offene Entscheidungen sichtbar dokumentieren.\n- Noch nicht beschlossene Regeln nicht als verbindlich darstellen.`;

            const leadBody = item => `## Zweck dieses Leit-Issues\n${item.goal}\n\n> Dieses Issue strukturiert den Themenbereich. Konkrete Fachregeln werden später in daraus abgeleiteten Arbeits-Issues und Dokumenten erarbeitet.\n\n## Zu strukturierende Teilbereiche\n${item.topics.map(value => `- ${value}`).join('\n')}\n\n## Erwartetes Ergebnis der Detailplanung\n${item.result}\n\n## Abschlusskriterien\n- [ ] Der Themenbereich ist in direkt bearbeitbare Fach-Issues zerlegt.\n- [ ] Abhängigkeiten zu anderen Milestones sind verlinkt.\n- [ ] Erwartete Dokumente und offene Grundsatzentscheidungen sind benannt.\n- [ ] Das Leit-Issue enthält keine unbeschlossenen Spielregeln als verbindliche Vorgabe.`;

            const issues = [
              // D1 – konkrete Arbeits-Issues
              {
                milestone: 'D1 – Spielvision und Kernloop',
                kind: 'work',
                title: 'Spielvision von Galaxis definieren',
                goal: 'Eine kurze, eindeutige Vision formulieren, die beschreibt, welches Spiel Galaxis sein soll und welches langfristige Erlebnis im Mittelpunkt steht.',
                scope: 'Noch keine einzelnen Mechaniken ausgestalten. Der Text beschreibt Identität, Maßstab und gewünschtes Spielerlebnis.',
                outputs: ['`docs/00-vision/game-vision.md`', 'Kurze Abgrenzung zu ähnlichen Spielen und Genres'],
                criteria: ['Die Vision ist in wenigen Absätzen verständlich.', 'Langfristiges asynchrones Spielen ist eingeordnet.', 'Die Vision kann spätere Designentscheidungen begründen.']
              },
              {
                milestone: 'D1 – Spielvision und Kernloop', kind: 'work',
                title: 'Zielgruppe und gewünschtes Spielerlebnis definieren',
                goal: 'Beschreiben, für welche Spieler Galaxis gedacht ist und welche Erwartungen an Tiefe, Bedienaufwand, Planbarkeit und Sitzungsdauer bestehen.',
                scope: 'Keine konkrete UI gestalten. Beschrieben werden Nutzungssituation und gewünschte Belastung des Spielers.',
                outputs: ['Zielgruppenbeschreibung', 'Erwartete Spielhäufigkeit und Aufmerksamkeit', 'Gewünschte Balance zwischen Kontrolle und Automatisierung'],
                criteria: ['Primäre Zielgruppe ist benannt.', 'Gelegenheits- und Intensivspiel werden abgegrenzt.', 'Konsequenzen für spätere Systeme sind sichtbar.']
              },
              {
                milestone: 'D1 – Spielvision und Kernloop', kind: 'work',
                title: 'Designprinzipien und Nicht-Ziele festlegen',
                goal: 'Verbindliche Leitplanken für spätere Fachentscheidungen definieren.',
                scope: 'Prinzipien sollen stabil und systemübergreifend sein. Einzelne Balancingwerte gehören nicht hierher.',
                outputs: ['Liste verbindlicher Designprinzipien', 'Liste bewusster Nicht-Ziele', 'Begründung je Prinzip'],
                criteria: ['Prinzipien sind überprüfbar formuliert.', 'Nicht-Ziele verhindern unnötige Ausweitung.', 'Konflikte zwischen Prinzipien werden benannt.']
              },
              {
                milestone: 'D1 – Spielvision und Kernloop', kind: 'work',
                title: 'Kern-Gameplay-Loop beschreiben',
                goal: 'Den wiederkehrenden Ablauf beschreiben, durch den Spieler Informationen prüfen, Ziele setzen, Befehle erteilen und auf Ergebnisse reagieren.',
                scope: 'Nur der übergeordnete Loop. Detailmechaniken werden in späteren Milestones definiert.',
                outputs: ['`docs/01-gameplay/core-loop.md`', 'Darstellung der wichtigsten Loop-Phasen', 'Beispiele für kurz-, mittel- und langfristige Entscheidungen'],
                criteria: ['Der Loop funktioniert ohne permanente Anwesenheit.', 'Information, Entscheidung, Ausführung und Rückmeldung sind getrennt.', 'Spätere Systeme lassen sich in den Loop einordnen.']
              },
              {
                milestone: 'D1 – Spielvision und Kernloop', kind: 'work',
                title: 'Typische Spielsitzung und Check-in-Rhythmus definieren',
                goal: 'Festlegen, wie häufig Spieler sinnvoll nachsehen, wie lange eine Sitzung dauern soll und welche Tätigkeiten dabei typischerweise anfallen.',
                scope: 'Keine Bildschirmgestaltung. Es geht um Nutzungsrhythmus und Informationsmenge.',
                outputs: ['Beschreibung einer kurzen, normalen und längeren Sitzung', 'Erwarteter Check-in-Rhythmus', 'Anforderungen an Berichte und Benachrichtigungen'],
                criteria: ['Eine kurze Sitzung ist sinnvoll möglich.', 'Längere Abwesenheit führt nicht automatisch zu unspielbaren Nachteilen.', 'Der Informationsbedarf ist für den Client ableitbar.']
              },
              {
                milestone: 'D1 – Spielvision und Kernloop', kind: 'work',
                title: 'Zeitmodell, Geschwindigkeit und Pause definieren',
                goal: 'Festlegen, wie reale Zeit und Spielzeit zusammenhängen und wie Geschwindigkeit, Pause und zeitgesteuerte Vorgänge funktionieren.',
                scope: 'Noch keine konkreten Bau- oder Reisezeiten festlegen. Beschrieben wird das gemeinsame Zeitfundament.',
                outputs: ['Fachliches Zeitmodell', 'Regeln für Pause und Geschwindigkeitsänderungen', 'Grundsätze für parallele Vorgänge und Zeitpunkte'],
                criteria: ['Singleplayer-Verhalten ist eindeutig.', 'Das Modell bleibt für späteren Multiplayer erweiterbar.', 'Zeitabhängige Befehle sind deterministisch formulierbar.']
              },
              {
                milestone: 'D1 – Spielvision und Kernloop', kind: 'work',
                title: 'Offline-Fortschritt und Abwesenheit definieren',
                goal: 'Beschreiben, was während eines geschlossenen Clients oder längerer Abwesenheit weiterläuft und wie der Spieler anschließend informiert wird.',
                scope: 'Konkrete Schutzregeln für Krieg können als offene Abhängigkeit markiert werden.',
                outputs: ['Regeln für Offline-Fortschritt', 'Grenzen und Schutzmechanismen', 'Anforderungen an Rückkehrbericht und aufgelaufene Entscheidungen'],
                criteria: ['Client-Schließen stoppt nicht unbeabsichtigt die Simulation.', 'Kritische Entscheidungen während Abwesenheit sind geregelt.', 'Missbrauch und Frustpotenzial werden berücksichtigt.']
              },
              {
                milestone: 'D1 – Spielvision und Kernloop', kind: 'work',
                title: 'Kampagnenstruktur, Dauer, Sieg und Niederlage definieren',
                goal: 'Den groben Verlauf einer Kampagne von Start über mittlere Phase bis Endgame beschreiben.',
                scope: 'Detaillierte Krisen und Endgame-Systeme folgen in D8.',
                outputs: ['Phasen einer Kampagne', 'Angestrebte reale Kampagnendauer', 'Grundsätze für Sieg, Niederlage und Weiterspielen'],
                criteria: ['Ein klarer langfristiger Fortschrittsbogen ist erkennbar.', 'Sieg und Niederlage passen zum asynchronen Modell.', 'D8 kann darauf aufbauen.']
              },
              {
                milestone: 'D1 – Spielvision und Kernloop', kind: 'work',
                title: 'Spieler-, AI- und Reichsübernahmemodell definieren',
                goal: 'Festlegen, wie ein Reich durch einen menschlichen Spieler oder eine AI kontrolliert wird und wie spätere Übernahmen funktionieren.',
                scope: 'Keine konkrete AI-Implementierung. Ideen unter `ideas/` sind ausdrücklich nicht verbindlich.',
                outputs: ['Fachliches Controller-Modell', 'Regeln für Übernahme und Rückgabe eines Reiches', 'Grundsätze für offene Befehle und laufende Pläne'],
                criteria: ['Spieler und AI verwenden dieselben fachlichen Befehle.', 'Controllerwechsel verändert keine Spielregeln.', 'Singleplayer und späterer Multiplayer sind abbildbar.']
              },

              // D2
              { milestone: 'D2 – Galaxie und Sternensysteme', kind: 'lead', title: '[Leit-Issue] Galaxiestruktur und Generierung definieren', goal: 'Die grundlegende räumliche Struktur einer Kampagne vorbereiten.', topics: ['Galaxiegröße und Form', 'Anzahl und Verteilung von Systemen', 'prozedurale oder feste Erzeugung', 'Startpositionen und Regionen', 'Reproduzierbarkeit durch Seeds'], result: 'Konkrete Issues für Generierungsregeln, Parameter, Startverteilung und Sonderregionen.' },
              { milestone: 'D2 – Galaxie und Sternensysteme', kind: 'lead', title: '[Leit-Issue] Sternensysteme und Himmelskörper definieren', goal: 'Entitäten und Inhalte eines Sternensystems strukturieren.', topics: ['Sterne', 'Planeten und Monde', 'Asteroiden und Ressourcenobjekte', 'besondere Himmelskörper', 'Systemeigenschaften und Beziehungen'], result: 'Arbeits-Issues und Entitätsdokumente für System und Himmelskörper.' },
              { milestone: 'D2 – Galaxie und Sternensysteme', kind: 'lead', title: '[Leit-Issue] Erkundung und Informationsstände definieren', goal: 'Unbekannte, entdeckte und veraltete Informationen fachlich strukturieren.', topics: ['Fog of War', 'Entdeckungsstufen', 'Sensoren und Reichweiten', 'veraltete Informationen', 'Erstkontakt'], result: 'Arbeits-Issues für Informationsstufen, Sensorik und Erkundungsbefehle.' },
              { milestone: 'D2 – Galaxie und Sternensysteme', kind: 'lead', title: '[Leit-Issue] Bewegung und räumliche Verbindungen definieren', goal: 'Die möglichen Wege zwischen Systemen und deren fachliche Bedeutung strukturieren.', topics: ['Verbindungsmodell', 'Reichweite und Erreichbarkeit', 'Reisezeit', 'Blockaden und unzugängliche Räume', 'Routenwahl'], result: 'Arbeits-Issues für Reisen, Kartenverbindungen und Pfadregeln.' },
              { milestone: 'D2 – Galaxie und Sternensysteme', kind: 'lead', title: '[Leit-Issue] Besitz und Kontrolle von Sternensystemen definieren', goal: 'Klären, wie Systeme beansprucht, kontrolliert und verloren werden können.', topics: ['Anspruch', 'Besitz', 'militärische Kontrolle', 'Grenzen', 'umstrittene Systeme'], result: 'Arbeits-Issues für Eigentumszustände, Kontrollwechsel und sichtbare Grenzen.' },

              // D3
              { milestone: 'D3 – Planeten und Kolonien', kind: 'lead', title: '[Leit-Issue] Planetentypen und planetare Eigenschaften definieren', goal: 'Planeten als fachliche Entitäten und Lebensräume strukturieren.', topics: ['Planetentypen', 'Größe und Kapazität', 'Bewohnbarkeit', 'natürliche Ressourcen', 'besondere Eigenschaften'], result: 'Arbeits-Issues und Entitätsdokumente für Planetenmerkmale.' },
              { milestone: 'D3 – Planeten und Kolonien', kind: 'lead', title: '[Leit-Issue] Koloniegründung und Kolonielebenszyklus definieren', goal: 'Den Weg von einem unbesiedelten Planeten zur etablierten Kolonie strukturieren.', topics: ['Voraussetzungen', 'Kolonieschiff oder Gründungsprozess', 'Dauer und Kosten', 'frühe Entwicklungsphasen', 'Aufgabe oder Verlust einer Kolonie'], result: 'Arbeits-Issues für Gründung, Aufbauphasen und Abbruchregeln.' },
              { milestone: 'D3 – Planeten und Kolonien', kind: 'lead', title: '[Leit-Issue] Planetare Entwicklung und Kapazitäten definieren', goal: 'Langfristige Entwicklung und Grenzen einer Kolonie strukturieren.', topics: ['Entwicklungsstufen', 'Infrastruktur', 'Kapazitätsgrenzen', 'Wachstumsvoraussetzungen', 'Überlastung und Rückgang'], result: 'Arbeits-Issues für Entwicklungswerte, Grenzen und Zustandsübergänge.' },
              { milestone: 'D3 – Planeten und Kolonien', kind: 'lead', title: '[Leit-Issue] Bezirke, Gebäude und Bauvorgänge definieren', goal: 'Planetare Bau- und Produktionsstrukturen vorbereiten.', topics: ['Bezirke oder Flächennutzung', 'Gebäudetypen', 'Bauplätze und Voraussetzungen', 'Bauwarteschlangen', 'Ausbau, Umbau und Abriss'], result: 'Arbeits-Issues für Gebäudeentitäten, Baukommandos und Warteschlangen.' },
              { milestone: 'D3 – Planeten und Kolonien', kind: 'lead', title: '[Leit-Issue] Koloniespezialisierung und Verwaltung definieren', goal: 'Strategische Rollen und Verwaltungsaufwand von Kolonien strukturieren.', topics: ['Spezialisierungen', 'Prioritäten', 'Automatisierung', 'Verwaltungsgrenzen', 'sichtbare Kennzahlen und Warnungen'], result: 'Arbeits-Issues für Spezialisierung, Automatisierung und Verwaltungsbefehle.' },

              // D4
              { milestone: 'D4 – Bevölkerung und Wirtschaft', kind: 'lead', title: '[Leit-Issue] Bevölkerungsmodell definieren', goal: 'Die Abbildung der Bevölkerung in Kolonien strukturieren.', topics: ['Bevölkerungseinheiten oder Gruppen', 'Wachstum und Rückgang', 'Eigenschaften und Zugehörigkeiten', 'Migration', 'sichtbare und aggregierte Werte'], result: 'Arbeits-Issues für Population, Wachstum und Migration.' },
              { milestone: 'D4 – Bevölkerung und Wirtschaft', kind: 'lead', title: '[Leit-Issue] Arbeitskräfte und Beschäftigung definieren', goal: 'Zusammenspiel von Bevölkerung, Arbeit und Produktion vorbereiten.', topics: ['Arbeitskräftepotenzial', 'Beschäftigung', 'Qualifikationen', 'Arbeitslosigkeit', 'Priorisierung und Zuweisung'], result: 'Arbeits-Issues für Beschäftigungsregeln und Arbeitskräfteverteilung.' },
              { milestone: 'D4 – Bevölkerung und Wirtschaft', kind: 'lead', title: '[Leit-Issue] Ressourcen und Produktionsketten definieren', goal: 'Wirtschaftsgüter und ihre Umwandlung strukturieren.', topics: ['Ressourcentypen', 'Produktion und Verbrauch', 'Produktionsketten', 'Lagerung', 'Engpässe und Überschüsse'], result: 'Arbeits-Issues für Güterkatalog, Produktion und Lager.' },
              { milestone: 'D4 – Bevölkerung und Wirtschaft', kind: 'lead', title: '[Leit-Issue] Bedürfnisse und Versorgung definieren', goal: 'Auswirkungen der Versorgung auf Bevölkerung und Kolonien vorbereiten.', topics: ['Grund- und Luxusbedürfnisse', 'Versorgungsgrad', 'Mangelzustände', 'Zufriedenheit oder Stabilität', 'Priorisierung knapper Güter'], result: 'Arbeits-Issues für Bedürfnisse, Versorgung und Folgen von Mangel.' },
              { milestone: 'D4 – Bevölkerung und Wirtschaft', kind: 'lead', title: '[Leit-Issue] Handel und Transport definieren', goal: 'Austausch von Ressourcen innerhalb und zwischen Reichen strukturieren.', topics: ['interner Transport', 'Handelsrouten', 'Reichweite und Kapazität', 'Preise oder Tauschregeln', 'Unterbrechungen und Blockaden'], result: 'Arbeits-Issues für Transportnetz, Handel und Unterbrechungen.' },
              { milestone: 'D4 – Bevölkerung und Wirtschaft', kind: 'lead', title: '[Leit-Issue] Einnahmen, Ausgaben und Unterhalt definieren', goal: 'Übergeordnete Wirtschaftsrechnung eines Reiches vorbereiten.', topics: ['Einnahmequellen', 'laufender Unterhalt', 'Bau- und Forschungskosten', 'Defizite und Reserven', 'wirtschaftliche Kennzahlen'], result: 'Arbeits-Issues für Reichshaushalt, Unterhalt und Defizitfolgen.' },

              // D5
              { milestone: 'D5 – Forschung und Technologien', kind: 'lead', title: '[Leit-Issue] Forschungsressourcen und Fortschritt definieren', goal: 'Das grundlegende Forschungsmodell strukturieren.', topics: ['Forschungsleistung', 'Fortschrittsberechnung', 'Forschungsbereiche', 'Parallelität', 'Unterbrechung und Wechsel'], result: 'Arbeits-Issues für Forschungswerte und Fortschrittsregeln.' },
              { milestone: 'D5 – Forschung und Technologien', kind: 'lead', title: '[Leit-Issue] Technologieauswahl und Technologiestruktur definieren', goal: 'Form und Navigation des Technologiesystems vorbereiten.', topics: ['Technologiebaum, Karten oder Alternativen', 'Voraussetzungen', 'sichtbare Auswahl', 'Zufall und Planbarkeit', 'wiederholbare Technologien'], result: 'Arbeits-Issues für Struktur, Auswahl und Voraussetzungen.' },
              { milestone: 'D5 – Forschung und Technologien', kind: 'lead', title: '[Leit-Issue] Technologieeffekte und Freischaltungen definieren', goal: 'Arten von Technologieergebnissen strukturieren.', topics: ['neue Entitäten und Befehle', 'Verbesserungen', 'Modifikatoren', 'alternative Produktionsweisen', 'Kompatibilität bestehender Spielstände'], result: 'Arbeits-Issues für Effektarten und Freischaltungsregeln.' },
              { milestone: 'D5 – Forschung und Technologien', kind: 'lead', title: '[Leit-Issue] Forschungsschwerpunkte und Spezialisierung definieren', goal: 'Strategische Ausrichtung der Forschung vorbereiten.', topics: ['Schwerpunkte', 'Spezialisierungsboni', 'Opportunitätskosten', 'langfristige Pfade', 'Umschalten von Prioritäten'], result: 'Arbeits-Issues für Forschungsstrategien und Spezialisierung.' },
              { milestone: 'D5 – Forschung und Technologien', kind: 'lead', title: '[Leit-Issue] Technologietransfer und Aufholen definieren', goal: 'Interaktion zwischen Reichen auf technologischer Ebene strukturieren.', topics: ['Austausch', 'Spionage oder Beobachtung', 'Rückstandseffekte', 'Bündnisvorteile', 'Begrenzung von Schneeballeffekten'], result: 'Arbeits-Issues für Transfer, Aufholen und Wissensteilung.' },

              // D6
              { milestone: 'D6 – Flotten und Raumkampf', kind: 'lead', title: '[Leit-Issue] Schiffe und Schiffstypen definieren', goal: 'Schiffe als militärische und zivile Entitäten strukturieren.', topics: ['Schiffstypen', 'Eigenschaften und Rollen', 'Module oder Ausrüstung', 'Bau und Kosten', 'Lebenszyklus'], result: 'Arbeits-Issues für Schiffsentitäten, Typen und Bau.' },
              { milestone: 'D6 – Flotten und Raumkampf', kind: 'lead', title: '[Leit-Issue] Flottenbildung und Flottenverwaltung definieren', goal: 'Zusammenfassung und Organisation von Schiffen vorbereiten.', topics: ['Flottenerstellung', 'Zusammenlegen und Teilen', 'Kommandostruktur', 'Kapazitätsgrenzen', 'Flottenstatus'], result: 'Arbeits-Issues für Flottenentität und Verwaltungsbefehle.' },
              { milestone: 'D6 – Flotten und Raumkampf', kind: 'lead', title: '[Leit-Issue] Flottenbewegung und Flottenbefehle definieren', goal: 'Operative Bewegung und Auftragsausführung strukturieren.', topics: ['Bewegungsbefehle', 'Warteschlangen', 'Abbruch und Umleitung', 'Reichweite', 'Ankunft und Rückmeldung'], result: 'Arbeits-Issues für konkrete Flottenbefehle und Reiseabläufe.' },
              { milestone: 'D6 – Flotten und Raumkampf', kind: 'lead', title: '[Leit-Issue] Raumkampf definieren', goal: 'Beginn, Ablauf und Ende von Raumkämpfen vorbereiten.', topics: ['Kampfbeginn', 'Teilnehmer', 'Kampfrunden oder kontinuierlicher Ablauf', 'Zielauswahl', 'Rückzug und Ergebnis'], result: 'Arbeits-Issues für Kampfsystem, Kampfzustände und Befehle.' },
              { milestone: 'D6 – Flotten und Raumkampf', kind: 'lead', title: '[Leit-Issue] Schäden, Reparatur und Verluste definieren', goal: 'Folgen militärischer Einsätze strukturieren.', topics: ['Schadensarten', 'zerstörte und beschädigte Schiffe', 'Reparatur', 'Bergung', 'Erfahrungs- oder Veteraneneffekte'], result: 'Arbeits-Issues für Schaden, Reparatur und Verlustbehandlung.' },
              { milestone: 'D6 – Flotten und Raumkampf', kind: 'lead', title: '[Leit-Issue] Militärische Versorgung und Reichweite definieren', goal: 'Logistische Grenzen von Flotten vorbereiten.', topics: ['Versorgung', 'Treibstoff oder Reichweitenmodell', 'Basen und Nachschub', 'Einsatzdauer', 'Folgen fehlender Versorgung'], result: 'Arbeits-Issues für Flottenlogistik und Reichweitenbeschränkungen.' },

              // D7
              { milestone: 'D7 – Reiche und Diplomatie', kind: 'lead', title: '[Leit-Issue] Reichsentität und Reichsverwaltung definieren', goal: 'Das Reich als zentrale fachliche Entität strukturieren.', topics: ['Identität', 'Eigentum und Controller', 'Gebiet und Besitz', 'Verwaltungswerte', 'Lebenszyklus eines Reiches'], result: 'Arbeits-Issues und Entitätsdokumente für Reiche.' },
              { milestone: 'D7 – Reiche und Diplomatie', kind: 'lead', title: '[Leit-Issue] Beziehungen und diplomatische Haltung definieren', goal: 'Abbildung von Beziehungen zwischen Reichen vorbereiten.', topics: ['Beziehungswerte', 'Vertrauen und Bedrohung', 'Meinungsursachen', 'sichtbare Informationen', 'zeitliche Veränderung'], result: 'Arbeits-Issues für Beziehungsmodell und diplomatische Wahrnehmung.' },
              { milestone: 'D7 – Reiche und Diplomatie', kind: 'lead', title: '[Leit-Issue] Diplomatische Aktionen definieren', goal: 'Mögliche direkte Interaktionen zwischen Reichen strukturieren.', topics: ['Anfragen und Angebote', 'Annahme und Ablehnung', 'Kosten und Abklingzeiten', 'Ultimaten', 'Rückmeldungen'], result: 'Arbeits-Issues für einzelne diplomatische Befehle.' },
              { milestone: 'D7 – Reiche und Diplomatie', kind: 'lead', title: '[Leit-Issue] Verträge und Bündnisse definieren', goal: 'Dauerhafte diplomatische Zustände vorbereiten.', topics: ['Nichtangriff', 'Handel', 'Verteidigungsbündnisse', 'Laufzeit und Kündigung', 'Vertragsbruch'], result: 'Arbeits-Issues für Vertragstypen, Zustände und Folgen.' },
              { milestone: 'D7 – Reiche und Diplomatie', kind: 'lead', title: '[Leit-Issue] Konflikte, Kriegsziele und Frieden definieren', goal: 'Übergang von Diplomatie zu offenem Konflikt strukturieren.', topics: ['Kriegserklärung', 'Kriegsziele', 'Teilnehmer', 'Kriegsfortschritt', 'Friedensschluss und Folgen'], result: 'Arbeits-Issues für Krieg, Kriegsziele und Friedensverträge.' },
              { milestone: 'D7 – Reiche und Diplomatie', kind: 'lead', title: '[Leit-Issue] Controller, AI und Spielerübernahme weiter detaillieren', goal: 'Das in D1 beschlossene Controller-Modell für Reichsverwaltung und Diplomatie konkretisieren.', topics: ['AI-Berechtigungen', 'Übernahmeberichte', 'laufende diplomatische Angebote', 'Abwesenheit', 'Rückgabe an AI'], result: 'Arbeits-Issues für Controllerwechsel in konkreten Reichssituationen.' },

              // D8
              { milestone: 'D8 – Ereignisse, Krisen und Endgame', kind: 'lead', title: '[Leit-Issue] Ereignissystem definieren', goal: 'Allgemeinen Aufbau und Lebenszyklus von Ereignissen strukturieren.', topics: ['Auslöser', 'Bedingungen', 'Zielgruppen', 'Dauer und Ablauf', 'Wiederholbarkeit'], result: 'Arbeits-Issues für Ereignisentität, Trigger und Verarbeitung.' },
              { milestone: 'D8 – Ereignisse, Krisen und Endgame', kind: 'lead', title: '[Leit-Issue] Entscheidungen und Ereignisfolgen definieren', goal: 'Spielerentscheidungen innerhalb von Ereignissen vorbereiten.', topics: ['Optionen', 'Voraussetzungen', 'Fristen', 'sichtbare und verborgene Folgen', 'Standardentscheidung bei Abwesenheit'], result: 'Arbeits-Issues für Entscheidungsbefehle und Folgen.' },
              { milestone: 'D8 – Ereignisse, Krisen und Endgame', kind: 'lead', title: '[Leit-Issue] Anomalien und besondere Entdeckungen definieren', goal: 'Erkundungsbezogene besondere Inhalte strukturieren.', topics: ['Entdeckung', 'Untersuchung', 'Risiko und Belohnung', 'mehrstufige Abläufe', 'Einmaligkeit'], result: 'Arbeits-Issues für Anomalien, Untersuchungsbefehle und Ergebnisse.' },
