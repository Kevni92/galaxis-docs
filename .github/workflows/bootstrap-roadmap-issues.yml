              { milestone: 'D10 – Fachliche Dokumentation vollständig', kind: 'lead', title: '[Leit-Issue] Ableitbarkeit für Client, Server und Tests prüfen', goal: 'Sicherstellen, dass aus den Fachregeln konkrete Umsetzung und Tests abgeleitet werden können.', topics: ['Clientinformationen', 'Servervalidierung', 'Befehle und Fehlerfälle', 'Akzeptanzkriterien', 'Quellcodeverweise'], result: 'Konkrete Nachbesserungs-Issues für nicht implementierbare oder nicht testbare Dokumente.' },
              { milestone: 'D10 – Fachliche Dokumentation vollständig', kind: 'lead', title: '[Leit-Issue] REST-Verträge und finale MVP-Freigabe prüfen', goal: 'Den dokumentierten MVP-Umfang einschließlich aller erforderlichen Verträge final freigeben.', topics: ['Vertragsabdeckung', 'Versionierung', 'Navigation', 'Dokumentstatus', 'Freigabeprotokoll'], result: 'Finale Prüfliste und eindeutiger freigegebener Docs-Stand für die Umsetzung.' }
            ];

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'all', per_page: 100
            });
            const existingTitles = new Set(existingIssues.filter(item => !item.pull_request).map(item => item.title));
            const results = [];

            for (const item of issues) {
              const milestone = milestoneByTitle.get(item.milestone);
              if (!milestone) throw new Error(`Milestone not found: ${item.milestone}`);

              if (existingTitles.has(item.title)) {
                results.push({ title: item.title, milestone: item.milestone, status: 'existing' });
                continue;
              }

              const created = await github.rest.issues.create({
                owner,
                repo,
                title: item.title,
                body: item.kind === 'work' ? workBody(item) : leadBody(item),
                labels: [item.kind === 'work' ? 'fachkonzept' : 'leit-issue'],
                milestone: milestone.number
              });
              results.push({ title: item.title, number: created.data.number, milestone: item.milestone, status: 'created' });
            }

            const content = Buffer.from(JSON.stringify({ total: issues.length, results }, null, 2)).toString('base64');
            const resultPath = '.github/roadmap-issues-result.json';
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path: resultPath });
              sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: resultPath,
              message: 'chore: record roadmap issue bootstrap result',
              content,
              ...(sha ? { sha } : {})
            });
