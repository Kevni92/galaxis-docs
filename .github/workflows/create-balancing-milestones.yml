name: Create balancing milestones

# trigger 2
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/create-balancing-milestones.yml

permissions:
  contents: write
  issues: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const definitions = [
              ['B1 – MVP-Baseline-Balancing', 'Vollständige erste Zahlenbasis, Datenstruktur, Validator und ausführbare Referenzszenarien für alle MVP-Systeme.'],
              ['B2 – Automatisierte Simulationsprüfung', 'Headless-Simulation, Strategieprofile, Metrikberichte, Regression-Schwellen und Nachtläufe.'],
              ['B3 – Playtest-Balancing', 'Spielgefühl, Verständlichkeit, Informationslast, Pacing und strategische Vielfalt mit echten Spielsitzungen validieren.'],
              ['B4 – Release-Balancing', 'Release-Szenariomatrix, Exploitprüfung, Savegame-Kompatibilität und Freeze der ersten Release-Balancingversion.']
            ];
            const existing = await github.paginate(github.rest.issues.listMilestones, { owner, repo, state: 'all', per_page: 100 });
            const result = [];
            for (const [title, description] of definitions) {
              let milestone = existing.find(item => item.title === title);
              if (!milestone) milestone = (await github.rest.issues.createMilestone({ owner, repo, title, description })).data;
              else milestone = (await github.rest.issues.updateMilestone({ owner, repo, milestone_number: milestone.number, title, description, state: 'open' })).data;
              result.push({ number: milestone.number, title: milestone.title, state: milestone.state });
            }
            const labels = [
              ['balancing', '0E8A16', 'Numerische Werte, Formeln und Kataloge'],
              ['pacing', 'FBCA04', 'Zeitlicher Kampagnen- und Fortschrittsbogen'],
              ['simulation', '5319E7', 'Automatisierte deterministische Simulationsprüfung'],
              ['needs-playtest', 'D93F0B', 'Benötigt subjektive Prüfung im Playtest'],
              ['needs-data', 'C5DEF5', 'Benötigt Messdaten oder größere Vergleichsläufe'],
              ['baseline', '1D76DB', 'Erste verbindliche Implementierungsbaseline'],
              ['metrics', 'BFDADC', 'Metriken, Berichte und Qualitätsgrenzen'],
              ['release-balancing', 'B60205', 'Freigabe und Freeze einer Release-Balancingversion']
            ];
            for (const [name, color, description] of labels) {
              try { await github.rest.issues.updateLabel({ owner, repo, name, new_name: name, color, description }); }
              catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }
            const path = '.github/balancing-milestones-result.json';
            let sha;
            try { sha = (await github.rest.repos.getContent({ owner, repo, path, ref: 'main' })).data.sha; }
            catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch: 'main', sha,
              message: 'chore: record balancing milestones',
              content: Buffer.from(JSON.stringify({ milestones: result }, null, 2) + '\n').toString('base64')
            });