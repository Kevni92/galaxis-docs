name: Finalize documentation milestones

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-documentation-milestones.yml

permissions:
  contents: write
  issues: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Finalize documentation and milestones
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function readFile(path) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (Array.isArray(response.data)) throw new Error(`${path} is a directory`);
                return {
                  sha: response.data.sha,
                  content: Buffer.from(response.data.content, 'base64').toString('utf8')
                };
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
            }

            async function writeFile(path, content, message) {
              const existing = await readFile(path);
              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path,
                branch: 'main',
                message,
                content: Buffer.from(content).toString('base64'),
                ...(existing ? { sha: existing.sha } : {})
              });
            }

