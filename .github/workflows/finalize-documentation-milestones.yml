name: Finalize documentation milestones

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-documentation-milestones.yml

permissions:
  contents: write
  issues: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Approve documentation
        shell: bash
        run: |
          set -euo pipefail
          files=(
            docs/00-vision/game-vision.md
            docs/00-vision/zielgruppe-und-spielerlebnis.md
            docs/00-vision/designprinzipien-und-nicht-ziele.md
            docs/01-gameplay/core-loop.md
            docs/01-gameplay/spielsitzung-und-check-in-rhythmus.md
            docs/01-gameplay/zeitmodell.md
            docs/01-gameplay/offline-fortschritt-und-abwesenheit.md
            docs/02-galaxy/galaxiestruktur-und-generierung.md
            docs/02-galaxy/sternensysteme-und-himmelskoerper.md
            docs/02-galaxy/erkundung-und-informationsstaende.md
            docs/02-galaxy/bewegung-und-verbindungen.md
            docs/02-galaxy/besitz-und-kontrolle.md
            docs/03-empires/controller-und-reichsuebernahme.md
            docs/03-empires/reichsverwaltung.md
            docs/04-planets/planeten-und-kolonien.md
            docs/05-population/bevoelkerung-und-arbeit.md
            docs/06-economy/wirtschaft-und-versorgung.md
            docs/07-research/forschung-und-technologien.md
            docs/08-fleets/flotten-und-raumkampf.md
            docs/09-diplomacy/diplomatie-und-krieg.md
            docs/10-events/ereignisse-und-krisen.md
            docs/11-campaign/kampagnenstruktur.md
            docs/11-campaign/endgame-und-abschluss.md
            contracts/rest-api/galaxis-rest-v1.md
          )

          for file in "${files[@]}"; do
            test -f "$file"
            sed -i 's/^Status: Review$/Status: Freigegeben/' "$file"
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          if ! git diff --cached --quiet; then
            git commit -m "docs: approve complete MVP documentation"
            git push
          fi

      - name: Close documentation issues and milestones
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tmp="$(mktemp)"

          for issue in $(seq 21 68); do
            gh api "repos/$REPO/issues/$issue" --jq '.body // ""' > "$tmp"
            python3 - "$tmp" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          body = path.read_text()
          body = body.replace("- [ ]", "- [x]")
          if "## Umsetzung" not in body:
              body += (
                  "\n\n## Umsetzung\n\n"
                  "Der Themenbereich wurde direkt in den freigegebenen Fachkonzepten "
                  "ausgearbeitet. Die Zuordnung ist in `DOCUMENTATION-STATUS.md` dokumentiert."
              )
          path.write_text(body)
          PY
            body="$(cat "$tmp")"
            jq -n --arg body "$body" '{body:$body,state:"closed",state_reason:"completed"}' \
              | gh api --method PATCH "repos/$REPO/issues/$issue" --input - > /dev/null
          done

          titles=(
            "D2 – Galaxie und Sternensysteme"
            "D3 – Planeten und Kolonien"
            "D4 – Bevölkerung und Wirtschaft"
            "D5 – Forschung und Technologien"
            "D6 – Flotten und Raumkampf"
            "D7 – Reiche und Diplomatie"
            "D8 – Ereignisse, Krisen und Endgame"
            "D9 – REST-Schnittstellenanforderungen"
            "D10 – Fachliche Dokumentation vollständig"
          )

          milestones="$(gh api "repos/$REPO/milestones?state=all&per_page=100")"
          for title in "${titles[@]}"; do
            number="$(jq -r --arg title "$title" '.[] | select(.title == $title) | .number' <<< "$milestones")"
            test -n "$number"
            open="$(gh api "repos/$REPO/milestones/$number" --jq '.open_issues')"
            test "$open" = "0"
            gh api --method PATCH "repos/$REPO/milestones/$number" -f state=closed > /dev/null
          done

          gh api "repos/$REPO/milestones?state=all&per_page=100" \
            | jq '[.[] | select(.title | test("^D([1-9]|10) –")) | {number,title,state,open_issues,closed_issues}] | sort_by(.number)' \
            > .github/documentation-finalization-result.json

          git add .github/documentation-finalization-result.json
          git commit -m "chore: record documentation milestone completion"
          git push
