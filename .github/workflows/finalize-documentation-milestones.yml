              if (refreshed.data.open_issues !== 0) {
                throw new Error(`${title} still has ${refreshed.data.open_issues} open issue(s)`);
              }
              const updated = await github.rest.issues.updateMilestone({
                owner,
                repo,
                milestone_number: milestone.number,
                state: 'closed'
              });
              result.push({
                number: updated.data.number,
                title: updated.data.title,
                state: updated.data.state,
                open_issues: updated.data.open_issues,
                closed_issues: updated.data.closed_issues
