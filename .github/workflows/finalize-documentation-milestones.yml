            const result = [];
            for (const title of milestoneTitles) {
              const milestone = milestones.find(item => item.title === title);
              if (!milestone) throw new Error(`Milestone not found: ${title}`);
              const refreshed = await github.rest.issues.getMilestone({
                owner,
                repo,
                milestone_number: milestone.number
