name: Bootstrap roadmap milestones

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-roadmap-milestones.yml

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Create roadmap milestones
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const definitions = [
              {
                title: 'D1 – Spielvision und Kernloop',
                description: 'Definiert Vision, Zielgruppe, Designprinzipien, Kernloop, Zeitmodell, Offline-Fortschritt, Kampagnendauer und klare Nicht-Ziele von Galaxis.'
              },
              {
                title: 'D2 – Galaxie und Sternensysteme',
                description: 'Dokumentiert Aufbau und Erzeugung der Galaxie, Sternensysteme, Himmelskörper, Entfernungen, Bewegung, Sichtbarkeit und Erkundung.'
              },
              {
                title: 'D3 – Planeten und Kolonien',
                description: 'Definiert Planeten, Kolonisierung, Kolonien, Bezirke, Gebäude, Entwicklung, Kapazitäten und planetare Zustände.'
              },
              {
                title: 'D4 – Bevölkerung und Wirtschaft',
                description: 'Dokumentiert Bevölkerung, Wachstum, Arbeit, Bedürfnisse, Ressourcen, Produktion, Unterhalt, Märkte und wirtschaftliche Kreisläufe.'
              },
              {
                title: 'D5 – Forschung und Technologien',
                description: 'Definiert Forschung, Technologien, Voraussetzungen, Auswahl, Fortschritt, Spezialisierung und Freischaltungen.'
              },
              {
                title: 'D6 – Flotten und Raumkampf',
                description: 'Dokumentiert Schiffe, Flotten, Bewegung, Befehle, Aufklärung, Versorgung, Raumkampf, Schäden und Rückzug.'
              },
              {
                title: 'D7 – Reiche und Diplomatie',
                description: 'Definiert Reiche, Controller, Regierung, Beziehungen, Verträge, Kommunikation, Konflikte, Krieg und Friedensschlüsse.'
              },
              {
                title: 'D8 – Ereignisse, Krisen und Endgame',
                description: 'Dokumentiert Ereignisse, Anomalien, Entscheidungen, Krisen, Kampagnenziele, Sieg, Niederlage und Endgame.'
              },
              {
                title: 'D9 – REST-Schnittstellenanforderungen',
                description: 'Leitet aus freigegebenen Fachkonzepten verbindliche REST-Verträge, Requests, Responses, Fehlerfälle, Sichtbarkeit und Kompatibilitätsregeln ab.'
              },
              {
                title: 'D10 – Fachliche Dokumentation vollständig',
                description: 'Abschlussmeilenstein: Die für die erste umsetzbare Spielversion notwendigen Fachkonzepte, Entscheidungen, Begriffe, Verträge und Akzeptanzkriterien sind vollständig, konsistent und freigegeben.'
              }
            ];

            const existing = await github.paginate(github.rest.issues.listMilestones, {
              owner,
              repo,
              state: 'all',
              per_page: 100
            });

            const results = [];
            for (const definition of definitions) {
              let milestone = existing.find(item => item.title === definition.title);
              let status = 'existing';

              if (!milestone) {
                const created = await github.rest.issues.createMilestone({
                  owner,
                  repo,
                  title: definition.title,
                  description: definition.description
                });
                milestone = created.data;
                status = 'created';
              } else if (milestone.description !== definition.description) {
                const updated = await github.rest.issues.updateMilestone({
                  owner,
                  repo,
                  milestone_number: milestone.number,
                  description: definition.description
                });
                milestone = updated.data;
                status = 'updated';
              }

              results.push({
                number: milestone.number,
                title: milestone.title,
                state: milestone.state,
                status
              });
            }

            const path = '.github/milestones-bootstrap-result.json';
            let sha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path });
              sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: 'chore: record milestone bootstrap result',
              content: Buffer.from(JSON.stringify({ milestones: results }, null, 2) + '\n').toString('base64'),
              sha
            });
