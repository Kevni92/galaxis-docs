name: Close D1 milestone

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-d1-milestone.yml

permissions:
  contents: write
  issues: write

jobs:
  close-milestone:
    runs-on: ubuntu-latest
    steps:
      - name: Close D1 milestone
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'D1 – Spielvision und Kernloop';

            const milestones = await github.paginate(github.rest.issues.listMilestones, {
              owner,
              repo,
              state: 'all',
              per_page: 100
            });
            const milestone = milestones.find(item => item.title === title);
            if (!milestone) {
              core.setFailed(`Milestone not found: ${title}`);
              return;
            }

            if (milestone.open_issues !== 0) {
              core.setFailed(`Milestone still has ${milestone.open_issues} open issue(s)`);
              return;
            }

            const updated = await github.rest.issues.updateMilestone({
              owner,
              repo,
              milestone_number: milestone.number,
              state: 'closed'
            });

            const path = '.github/d1-milestone-result.json';
            const payload = JSON.stringify({
              number: updated.data.number,
              title: updated.data.title,
              state: updated.data.state,
              open_issues: updated.data.open_issues,
              closed_issues: updated.data.closed_issues
            }, null, 2) + '\n';

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: 'chore: record D1 milestone closure',
              content: Buffer.from(payload).toString('base64')
            });
