name: Bootstrap alpha docs issues

# trigger 1
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-alpha-docs-issues.yml

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const milestoneByAlpha = { A0: 16, A1: 17, A2: 18, A3: 19, A4: 20, A5: 21, A6: 22, A7: 23, A8: 24, A9: 25, A10: 26, A11: 27, A12: 28 };
            const alphaData = [
              ['A0', 'Technisches Fundament', 'Server und minimale Client-Shell sind lokal startfähig. Registrierung, Anmeldung, Sessionprüfung, PostgreSQL, REST-Grundstruktur, Balancing-Loader und CI funktionieren.', 'Ein neuer Account wird registriert, meldet sich an, ruft eine geschützte Testressource ab und der gesamte Ablauf läuft nach einem frischen Checkout reproduzierbar.'],
              ['A1', 'Heimatplanet', 'Ein neuer Spieler startet eine Kampagne und erhält deterministisch ein Reich mit Heimatsternsystem, Heimatplanet und Kolonie.', 'Registrieren, anmelden, Kampagne erstellen und den kolonisierten Heimatplaneten mit Basisdaten öffnen.'],
              ['A2', 'Schiffe und lokales Sternensystem', 'Ein statisches Erkundungsschiff existiert und kann innerhalb des Heimatsternsystems serverautoritativ bewegt werden.', 'Schiff auswählen, lokales Ziel bestimmen, Bewegungsbefehl senden und serverseitigen Reisefortschritt sehen.'],
              ['A3', 'Interstellare Erkundung', 'Das Erkundungsschiff reist in ein unbekanntes Nachbarsystem und deckt dessen Informationen reichsspezifisch auf.', 'Unbekanntes Nachbarsystem auswählen, Reise und Erkundung starten und anschließend neu freigegebene Systemdaten sehen.'],
              ['A4', 'Zweite Kolonie', 'Ein geeigneter entdeckter Himmelskörper kann kolonisiert und als zweite Kolonie in das Reich integriert werden.', 'Kolonieziel auswählen, Auftrag erteilen, Abschluss verarbeiten und zweite Kolonie öffnen.'],
              ['A5', 'Bevölkerung und Arbeit', 'Bevölkerung, Qualifikation, Beschäftigung, Migration und Arbeitsprioritäten erzeugen einen nachvollziehbaren Kreislauf.', 'Arbeitsprioritäten ändern und die serverseitig berechneten Beschäftigungs- und Bevölkerungsfolgen beobachten.'],
              ['A6', 'Wirtschaft, Gebäude und Versorgung', 'Gebäude, Güter, Produktion, Lager, Transport, Bedürfnisse und Haushalt bilden einen stabilen spielbaren Wirtschaftskreislauf.', 'Gebäude beauftragen, Produktionskette betreiben, Engpass erkennen und durch Priorität oder Transport beheben.'],
              ['A7', 'Forschung und Technologien', 'Forschung sammelt Fortschritt, erfüllt Voraussetzungen und schaltet Fähigkeiten oder Werte frei.', 'Technologie auswählen, Fortschritt verarbeiten, Abschluss sehen und Freischaltung verwenden.'],
              ['A8', 'Flottenlogistik und Reparatur', 'Mehrere Flotten können verwaltet, versorgt, aufgeteilt, zusammengeführt und repariert werden.', 'Beschädigte Flotte zurückführen, reparieren, aufteilen und mit gültiger Reichweite erneut entsenden.'],
              ['A9', 'Andere Reiche und Erstkontakt', 'Andere Reiche werden entdeckt und ausschließlich mit dem jeweiligen reichsspezifischen Wissen dargestellt.', 'Erstkontakt auslösen, gefilterte Reichsinformationen sehen und Kontaktbericht öffnen.'],
              ['A10', 'Diplomatie und Handel', 'Beziehungen, Angebote, Verträge und Handel bilden einen vollständigen friedlichen Interaktionsablauf.', 'Angebot senden, annehmen, Vertrag aktivieren und wirtschaftliche Wirkung nachvollziehen.'],
              ['A11', 'Konflikt und Raumkampf', 'Krieg, Flottenbegegnung, Rückzug, Schäden, Reparatur und begrenzter Frieden bilden einen vollständigen Konfliktablauf.', 'Krieg erklären, Kampf durchführen, Ergebnis und Verluste sehen und Frieden schließen.'],
              ['A12', 'Ereignisse, Krise und Kampagnenabschluss', 'Ereignisse, galaktische Krise, Siegespfade und Abschlussbericht beenden eine vollständige Alpha-Kampagne.', 'Krise durchlaufen, Abschlussbedingung erreichen und Kampagnenbericht öffnen.']
            ];
            const issues = [
              {
                title: '[ROADMAP] Server-first Implementierungsroadmap für Galaxis',
                milestone: null,
                labels: ['roadmap', 'umbrella'],
                body: `## Zweck\nDiese Aufgabe erstellt und pflegt die verbindliche projektübergreifende Implementierungsroadmap für \`galaxis-docs\`, \`galaxis-server\` und \`galaxis-client\`.\n\n## Grundentscheidung\n- Server-first, aber jede Alpha endet als kleiner spielbarer vertikaler Schnitt.\n- A0 schafft das technische Fundament.\n- A1 liefert den kolonisierten Heimatplaneten.\n- A2 liefert das erste Schiff und lokale Bewegung.\n- A3 liefert interstellare Reise und Erkundung.\n- Spätere Alphas erweitern denselben laufenden Spielstand schrittweise.\n\n## Erwartete Ergebnisse\n- \`roadmap/IMPLEMENTATION-ROADMAP.md\`\n- \`roadmap/CODEX-A0.md\`\n- Alpha-Milestones A0 bis A12 in allen drei Repositories\n- Docs-Umbrella-Issue je Alpha\n- konkrete Server- und minimale Client-Issues für A0 bis A3\n- Abhängigkeiten, Demos und Freigabegates\n- Zuordnung relevanter Balancing-Issues\n\n## Akzeptanzkriterien\n- [ ] Jede Alpha besitzt ein überprüfbares sichtbares Ergebnis.\n- [ ] A0 ist lokal mit Codex in eindeutiger Reihenfolge umsetzbar.\n- [ ] Server- und Client-Issues verweisen auf dieselben Feature-IDs und Fachquellen.\n- [ ] Keine Alpha setzt fachlich spätere Systeme stillschweigend voraus.\n- [ ] Balancing, Tests, Persistenz und Verträge sind nicht als spätere Sammelarbeit verschoben.`
              },
              ...alphaData.map(([alpha, name, goal, demo]) => ({
                title: `[${alpha}][ROADMAP] ${name}`,
                milestone: milestoneByAlpha[alpha],
                labels: ['roadmap', 'alpha', 'umbrella', 'vertical-slice'],
                body: `## Alpha-Ziel\n${goal}\n\n## Abnahmedemo\n${demo}\n\n## Verbindliche Regeln\n- Server bleibt für Zustand, Zeit, Wissen, Zufall und Validierung autoritativ.\n- Client implementiert nur den kleinsten zur Demo notwendigen Bedienweg.\n- Fachregeln stammen aus \`docs/\`, Verträge aus \`contracts/\`, Zahlen aus \`balancing/\`.\n- Persistenz, Tests und Fehlerzustände gehören zur Alpha und werden nicht nachträglich ergänzt.\n\n## Umfang\nDie konkreten Docs-, Server- und Client-Issues werden in diesem Umbrella verlinkt. Für ${alpha} dürfen keine Aufgaben späterer Alphas als versteckte Voraussetzung eingebaut werden.\n\n## Abschlusskriterien\n- [ ] alle zugeordneten Docs-Issues abgeschlossen\n- [ ] alle zugeordneten Server-Issues abgeschlossen\n- [ ] alle zugeordneten Client-Issues abgeschlossen\n- [ ] definierte Abnahmedemo reproduzierbar\n- [ ] relevante Referenzszenarien und Regressionstests grün\n- [ ] bekannte Abweichungen dokumentiert\n\n## Roadmap\nSiehe \`roadmap/IMPLEMENTATION-ROADMAP.md\`.`
              })),
              {
                title: '[A0][DOCS] OpenAPI-v1-Grundvertrag für Health und Authentifizierung definieren',
                milestone: 16,
                labels: ['alpha', 'api', 'codex-ready'],
                body: `**Feature-IDs:** \`GAL-API-CORE-001\`, \`GAL-AUTH-SESSION-001\`\n\n## Ziel\nDen bereits freigegebenen fachlichen REST-Vertrag für A0 in konkrete OpenAPI-Schemas für Serverstatus, Registrierung, Anmeldung, Abmeldung und Sessionprüfung überführen.\n\n## Umfang\n- \`GET /health/live\` und \`GET /health/ready\` außerhalb von \`/api/v1\`\n- \`POST /api/v1/auth/accounts\` für lokale Registrierung\n- \`POST /api/v1/auth/sessions\`\n- \`DELETE /api/v1/auth/sessions/current\`\n- \`GET /api/v1/auth/session\`\n- einheitliches Fehlerformat, Bearer-Schema und Beispiele\n\n## Akzeptanzkriterien\n- [ ] Pflichtfelder, Statuscodes und Fehlercodes sind eindeutig.\n- [ ] Registrierung verrät nicht, ob fremde Zugangsdaten existieren.\n- [ ] Passwort oder Passwort-Hash erscheint in keiner Antwort.\n- [ ] Contract-Tests können daraus abgeleitet werden.\n- [ ] Vertrag führt keine Gameplay-Regel ein.`
              },
              {
                title: '[A1][DOCS] OpenAPI-v1-Schemas für Kampagne, Reich und Heimatkolonie definieren',
                milestone: 17,
                labels: ['alpha', 'api'],
                body: `**Feature-IDs:** \`GAL-CAMPAIGN-CREATE-001\`, \`GAL-API-A1-STATE-001\`\n\n## Ziel\nKonkrete A1-Payloads für Kampagnenerstellung, Kampagnenliste, Startreich, bekanntes Heimatsternsystem, Heimatplanet und Kolonieübersicht festlegen.\n\n## Akzeptanzkriterien\n- [ ] gefilterte Wissensgrenzen sind in allen Antworten sichtbar\n- [ ] stabile undurchsichtige IDs und \`stateVersion\` werden verwendet\n- [ ] Startkampagne ist idempotent oder liefert klaren Konflikt\n- [ ] Client kann die A1-Demo ohne zusätzliche undokumentierte Felder umsetzen`
              },
              {
                title: '[A2][DOCS] OpenAPI-v1-Schemas für Schiffe, Flotten und lokale Bewegung definieren',
                milestone: 18,
                labels: ['alpha', 'api'],
                body: `**Feature-IDs:** \`GAL-FLEET-ENTITY-001\`, \`GAL-FLEET-MOVE-LOCAL-001\`\n\n## Ziel\nSchiffs- und Flottenressourcen, lokale Navigationsziele, Bewegungsbefehl, Reisezeit und Befehlsstatus für A2 konkretisieren.\n\n## Akzeptanzkriterien\n- [ ] Bewegungsbefehl verwendet \`clientCommandId\` und \`expectedStateVersion\`\n- [ ] ungültige Ziele und konkurrierende Befehle besitzen eindeutige Fehler\n- [ ] Client kann Reisefortschritt nur aus Serverdaten darstellen\n- [ ] keine interstellare Erkundungsregel wird vorweggenommen`
              },
              {
                title: '[A3][DOCS] OpenAPI-v1-Schemas für Galaxiekarte und Erkundung definieren',
                milestone: 19,
                labels: ['alpha', 'api'],
                body: `**Feature-IDs:** \`GAL-GALAXY-KNOWLEDGE-001\`, \`GAL-FLEET-EXPLORE-001\`\n\n## Ziel\nGefilterte Galaxiekarte, interstellare Route, Reise, Erkundungsbefehl, Wissensstand, Änderungsliste und Erkundungsergebnis konkretisieren.\n\n## Akzeptanzkriterien\n- [ ] unbekannte IDs und verborgene Eigenschaften werden nicht übertragen\n- [ ] Wissensstufen und Aktualisierungszeitpunkte sind eindeutig\n- [ ] Reise und Erkundung sind getrennte, idempotente Zustände\n- [ ] Offline-Nachholung liefert denselben fachlichen Endzustand`
              }
            ];
            const existing = await github.paginate(github.rest.issues.listForRepo, { owner, repo, state: 'all', per_page: 100 });
            const result = [];
            for (const spec of issues) {
              let issue = existing.find(item => !item.pull_request && item.title === spec.title);
              const payload = { owner, repo, title: spec.title, body: spec.body, labels: spec.labels };
              if (spec.milestone) payload.milestone = spec.milestone;
              if (!issue) issue = (await github.rest.issues.create(payload)).data;
              else issue = (await github.rest.issues.update({ owner, repo, issue_number: issue.number, title: spec.title, body: spec.body, labels: spec.labels, milestone: spec.milestone || null, state: 'open' })).data;
              result.push({ number: issue.number, title: issue.title, milestone: issue.milestone?.number || null });
            }
            const path = '.github/alpha-docs-issues.json';
            let sha;
            try { sha = (await github.rest.repos.getContent({ owner, repo, path, ref: 'main' })).data.sha; } catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({ owner, repo, path, branch: 'main', sha, message: 'chore: record alpha docs issues', content: Buffer.from(JSON.stringify(result, null, 2) + '\n').toString('base64') });
