name: Finalize balancing documentation

# trigger 2
on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-balancing-docs.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function readFile(path) {
              const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              return {
                sha: response.data.sha,
                content: Buffer.from(response.data.content, 'base64').toString('utf8')
              };
            }

            async function writeFile(path, content, message) {
              const current = await readFile(path);
              if (current.content === content) return false;
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path, branch: 'main', sha: current.sha,
                message,
                content: Buffer.from(content).toString('base64')
              });
              return true;
            }

            const changed = [];

            {
              const path = 'README.md';
              const current = await readFile(path);
              let content = current.content;
              if (!content.includes('## Balancing')) {
                content = content.replace(
                  'Die fachliche MVP-Dokumentation ist [vollständig geprüft und freigegeben](DOCUMENTATION-STATUS.md).',
                  'Die fachliche MVP-Dokumentation ist [vollständig geprüft und freigegeben](DOCUMENTATION-STATUS.md).\n\n## Balancing\n\nNumerische Zielwerte, Formeln, Referenzszenarien und die Balancing-Roadmap liegen unter [`balancing/`](balancing/README.md). Die aktuelle Zahlenbasis ist **Baseline v0.1** und noch nicht durch vollständige Simulation oder Playtests validiert.'
                );
              }
              if (await writeFile(path, content, 'docs: link balancing area from root readme')) changed.push(path);
            }

            {
              const path = 'AGENTS.md';
              const content = `# Agent-Anweisungen

1. Vor jeder Aufgabe lesen: \`README.md\`, \`WORKFLOW.md\`, \`TESTING.md\`, \`SOURCE-CODE.md\`, \`docs/conventions.md\` sowie die relevanten Fach-, Vertrags-, Entscheidungs- und Balancingdokumente.
2. \`galaxis-docs\` ist die fachliche Quelle. Fehlende oder widersprüchliche Spielregeln dürfen nicht erfunden oder stillschweigend entschieden werden.
3. Fachliche Änderungen verwenden die passende Vorlage unter \`templates/\`, die Begriffe aus \`glossary.md\` und aktualisieren die nächstgelegene Navigation.
4. Spielregeln werden zuerst dokumentiert und freigegeben; danach entstehen getrennte Client- und Server-Issues gemäß \`WORKFLOW.md\`.
5. Umsetzungs-Repositories müssen fachlich relevanten Quellcode knapp mit den maßgeblichen Docs verknüpfen und gemäß \`TESTING.md\` testen.
6. Inhalte unter \`balancing/\` dürfen nur Zahlen, Formeln, Kataloge und Zielkorridore konkretisieren. Sie dürfen Fachregeln, Berechtigungen, Informationsgrenzen oder Invarianten nicht verändern.
7. Jede produktive Balancingänderung benötigt Version, Quelle, Metrikziel, Referenzszenario, Vorher-/Nachher-Nachweis und Changelog-Eintrag.
8. Inhalte unter \`ideas/\` sind unverbindlich, keine fachliche Quelle und dürfen nur berücksichtigt werden, wenn eine Aufgabe ausdrücklich auf die jeweilige Idee verweist.
9. Fachliche und Balancingänderungen erfolgen im Docs-Repository, nicht in der eingebundenen Submodule-Kopie.
10. \`CLAUDE.md\` enthält keine eigenen Regeln und verweist nur auf diese Datei.
`;
              if (await writeFile(path, content, 'docs: add balancing agent rules')) changed.push(path);
            }

            {
              const path = 'WORKFLOW.md';
              const current = await readFile(path);
              let content = current.content;
              if (!content.includes('- versionierte Balancingziele, Formeln und Referenzszenarien,')) {
                content = content.replace(
                  '- Designentscheidungen,\n- projektübergreifenden Arbeits- und Testprozess.',
                  '- Designentscheidungen,\n- versionierte Balancingziele, Formeln und Referenzszenarien,\n- projektübergreifenden Arbeits- und Testprozess.'
                );
              }
              const oldPriority = `1. angenommene Designentscheidung unter \`decisions/\`,
2. freigegebenes Fachdokument unter \`docs/\`,
3. freigegebener Vertrag unter \`contracts/\`,
4. Dokument im Review,
5. Entwurf,
6. Issue, PR-Kommentar oder Chat.

Ein Issue ersetzt keine freigegebene Fachregel.`;
              const newPriority = `1. angenommene Designentscheidung unter \`decisions/\`,
2. freigegebener Vertrag unter \`contracts/\`,
3. freigegebenes Fachdokument unter \`docs/\`,
4. freigegebene oder als Baseline gekennzeichnete Balancingquelle unter \`balancing/\`,
5. Dokument im Review,
6. Entwurf,
7. Issue, PR-Kommentar oder Chat.

Ein Issue ersetzt keine freigegebene Fachregel. Inhalte unter \`ideas/\` besitzen keine fachliche Wirkung. Balancingquellen dürfen höher priorisierte Fachregeln nicht verändern.`;
              content = content.replace(oldPriority, newPriority);
              if (!content.includes('## 9. Balancing-Lebenszyklus')) {
                content = content.trimEnd() + `

## 9. Balancing-Lebenszyklus

Balancingänderungen folgen zusätzlich dem verbindlichen Ablauf aus [\`balancing/workflow.md\`](balancing/workflow.md).

Dabei gilt:

1. beobachtetes Verhalten und Spielerwirkung beschreiben,
2. Ausgangsmetriken mit Version, Szenario und Seeds sichern,
3. Änderungshypothese und Zielkorridor formulieren,
4. Werte in versionierten Serverdaten ändern,
5. Formeln, Erhaltung, Determinismus und Referenzszenarien testen,
6. Vorher-/Nachher-Bericht erstellen,
7. Playtestbedarf bewerten,
8. Balancingstatus, Version und Changelog aktualisieren,
9. Savegame-, Migrations- und Rollbackwirkung dokumentieren.

Eine Balancingänderung, die eine neue Spielregel, Berechtigung, Information oder Zustandsbedeutung benötigt, kehrt vor der Umsetzung zum fachlichen Docs-Workflow zurück.
`;
              }
              if (await writeFile(path, content, 'docs: integrate balancing into workflow')) changed.push(path);
            }

            {
              const path = 'TESTING.md';
              const current = await readFile(path);
              let content = current.content;
              if (!content.includes('## 11. Balancing- und Simulationstests')) {
                content = content.trimEnd() + `

## 11. Balancing- und Simulationstests

Balancingänderungen benötigen risikobasierte Nachweise gemäß [\`balancing/workflow.md\`](balancing/workflow.md).

### In jeder betroffenen Pull Request

- Daten- und Schemavalidierung,
- betroffene Formel-, Grenzwert- und Rundungstests,
- deterministische Wiederholung mit festen Seeds,
- Erhaltungstest für Bevölkerung, Güter, Schiffe oder andere konservierte Größen,
- kleine betroffene Referenzszenarien,
- Vorher-/Nachher-Vergleich mit identischen Eingaben,
- Prüfung von Balancingversion, Quellen und Changelog.

### Nach Merge oder nachts

- Coverage-Seeds,
- vollständige Strategieprofile,
- Langzeit- und Offline-Nachholung,
- Verteilungs- und Ausreißerbericht,
- Performance großer Kampagnen,
- Reproduction Seeds bekannter Fehler.

### Release

- alle Golden-, Coverage- und Reproduction-Seeds,
- vollständige Referenzszenariomatrix,
- Exploit- und Dominanzprüfung,
- Savegame-, Migrations- und Hashkompatibilität,
- eingefrorene Balancingversion mit Freigabebericht.

Ein Mittelwert allein reicht nicht. Berichte enthalten mindestens Median, relevante Perzentile, Anteil außerhalb des Zielkorridors und die verwendeten Seeds. Eine Baseline darf nicht als validiert oder releasefähig bezeichnet werden, wenn die in [\`balancing/metrics.md\`](balancing/metrics.md) geforderten Nachweise fehlen.
`;
              }
              if (await writeFile(path, content, 'docs: add balancing test strategy')) changed.push(path);
            }

            {
              const path = 'DOCUMENTATION-STATUS.md';
              const current = await readFile(path);
              let content = current.content;
              content = content.replace(
                'Numerische Balancingwerte, konkrete Inhaltskataloge und technische Bibliotheksentscheidungen bleiben Umsetzungsaufgaben. Sie dürfen die hier festgelegten Zustände, Verantwortlichkeiten und Invarianten nicht stillschweigend verändern.',
                'Die fachlichen Regeln sind freigegeben. Numerische Werte, Formeln und Zielkorridore besitzen nun eine erste [Balancing-Baseline v0.1](balancing/README.md). Diese Baseline ist für die erste Implementierung verbindlich, aber noch nicht durch vollständige Simulation oder Playtests validiert. Technische Bibliotheksentscheidungen bleiben Umsetzungsaufgaben.'
              );
              const oldPriority = `1. angenommene Dateien unter [\`decisions/\`](decisions/README.md),
2. freigegebene Verträge unter [\`contracts/\`](contracts/README.md),
3. freigegebene Fachdokumente unter [\`docs/\`](docs/README.md),
4. sonstige Projekttexte,
5. Inhalte unter [\`ideas/\`](ideas/README.md) besitzen keine fachliche Wirkung.`;
              const newPriority = `1. angenommene Dateien unter [\`decisions/\`](decisions/README.md),
2. freigegebene Verträge unter [\`contracts/\`](contracts/README.md),
3. freigegebene Fachdokumente unter [\`docs/\`](docs/README.md),
4. freigegebene oder als Baseline gekennzeichnete Werte unter [\`balancing/\`](balancing/README.md),
5. sonstige Projekttexte,
6. Inhalte unter [\`ideas/\`](ideas/README.md) besitzen keine fachliche Wirkung.`;
              content = content.replace(oldPriority, newPriority);
              content = content.replace(
                '- numerische Balancingwerte,\n- konkrete Kataloge von Gütern, Gebäuden, Technologien, Schiffen und Ereignissen,',
                '- empirische Validierung und Feintuning der Balancing-Baseline,\n- konkrete produktive Kataloge von Gütern, Gebäuden, Technologien, Schiffen und Ereignissen,'
              );
              if (!content.includes('## Balancingstatus')) {
                content = content.replace(
                  '## Ableitbarkeit für Client',
                  `## Balancingstatus

Der Balancingbereich definiert:

- systemweite Pacing- und Stabilitätsziele,
- Formeln, Einheiten und Rundungsregeln,
- Fachbereichsbaselines,
- Messgrößen und Qualitätsgrenzen,
- ein versioniertes Datenformat,
- Referenzszenarien S01 bis S05,
- die Roadmap B1 bis B4.

Aktueller Status: **Baseline v0.1**. Noch offen sind produktive Datenkataloge und Serverdaten, automatisierte Simulation, Playtestvalidierung und Release-Freeze. Diese Arbeiten werden in den Milestones B1 bis B4 geführt.

## Ableitbarkeit für Client`
                );
              }
              if (await writeFile(path, content, 'docs: record balancing baseline status')) changed.push(path);
            }

            {
              const path = 'decisions/README.md';
              const current = await readFile(path);
              let content = current.content;
              if (!content.includes('0004 – Versionierte Balancing-Schicht')) {
                content = content.trimEnd() + '\n- [0004 – Versionierte Balancing-Schicht](0004-versionierte-balancing-schicht.md) – angenommen\n';
              }
              if (await writeFile(path, content, 'docs: index balancing decision')) changed.push(path);
            }

            {
              const path = 'templates/README.md';
              const current = await readFile(path);
              let content = current.content;
              if (!content.includes('balancing-change-template.md')) {
                content = content.trimEnd() + '\n- [Balancing-Änderung](balancing-change-template.md) – messbare Änderung an Werten, Formeln oder Pacingzielen\n';
              }
              if (await writeFile(path, content, 'docs: index balancing template')) changed.push(path);
            }

            const path = '.github/balancing-finalization-result.json';
            let sha;
            try { sha = (await github.rest.repos.getContent({ owner, repo, path, ref: 'main' })).data.sha; }
            catch (error) { if (error.status !== 404) throw error; }
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch: 'main', sha,
              message: 'chore: record balancing documentation finalization',
              content: Buffer.from(JSON.stringify({ changed }, null, 2) + '\n').toString('base64')
            });