name: Close completed documentation milestones

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/close-documentation-milestones.yml

permissions:
  contents: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Close D2 through D10
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const titles = [
              'D2 – Galaxie und Sternensysteme',
              'D3 – Planeten und Kolonien',
              'D4 – Bevölkerung und Wirtschaft',
              'D5 – Forschung und Technologien',
              'D6 – Flotten und Raumkampf',
              'D7 – Reiche und Diplomatie',
              'D8 – Ereignisse, Krisen und Endgame',
              'D9 – REST-Schnittstellenanforderungen',
              'D10 – Fachliche Dokumentation vollständig'
            ];

            const milestones = await github.paginate(github.rest.issues.listMilestones, {
              owner,
              repo,
              state: 'all',
              per_page: 100
            });

            const result = [];
            for (const title of titles) {
              const milestone = milestones.find(item => item.title === title);
              if (!milestone) throw new Error(`Missing milestone: ${title}`);
              if (milestone.open_issues !== 0) throw new Error(`${title} has ${milestone.open_issues} open issues`);
              const updated = await github.rest.issues.updateMilestone({
                owner,
                repo,
                milestone_number: milestone.number,
                state: 'closed'
              });
              result.push({
                number: updated.data.number,
                title: updated.data.title,
                state: updated.data.state,
                open_issues: updated.data.open_issues,
                closed_issues: updated.data.closed_issues
              });
            }

            const path = '.github/documentation-finalization-result.json';
            let sha;
            try {
              const existing = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
              sha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch: 'main',
              message: 'chore: record completed documentation milestones',
              content: Buffer.from(JSON.stringify({ milestones: result }, null, 2) + '\n').toString('base64'),
              ...(sha ? { sha } : {})
            });
