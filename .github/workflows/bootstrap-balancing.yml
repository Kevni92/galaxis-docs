                results: ['Grund-, Roh-, Industrie- und strategische Güter', 'Referenzwerte', 'Einheiten und Katalogversion'],
                criteria: ['Jedes Gut eröffnet eine eigenständige Entscheidung.', 'Keine unnötigen Duplikate.', 'Alle Referenzen und Einheiten werden validiert.']
