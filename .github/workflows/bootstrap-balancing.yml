                milestone: 'B1 – MVP-Baseline-Balancing',
                labels: ['balancing', 'baseline', 'pacing', 'needs-playtest'],
                goal: 'Ereignishäufigkeit, Entscheidungsfristen, Kriseneskalation und Siegankündigung auf den täglichen Check-in und den zwölfwöchigen Abschluss abstimmen.',
                sources: ['balancing/domains/diplomacy-events-and-endgame.md', 'balancing/scenarios/s05-krise-und-endgame.md'],
                results: ['Ereignisgewichte', 'Fristen', 'Krisen- und Endgame-Zeitplan'],
                criteria: ['Im Median höchstens eine bedeutende Ereigniswahl pro Tag.', 'Endgame wird Woche 8 bis 10 relevant.', 'Sieg ist 48 bis 96 Stunden vorher sichtbar.']
              },
              {
