                goal: 'Siegquoten, Schadensstreuung, Rückzug, Vollvernichtung, Reparatur und Bergung gegen die militärischen Qualitätsgrenzen kalibrieren.',
                sources: ['balancing/domains/fleets-travel-and-combat.md', 'balancing/scenarios/s04-krieg-und-wiederaufbau.md'],
                results: ['Wirksamkeitsmatrix', 'Schadens- und Rückzugskurven', 'Reparaturkosten und -zeiten'],
                criteria: ['Siegquoten folgen dem Kräfteverhältnis.', 'Vollvernichtung bei Gleichstand bleibt unter 10 Prozent.', 'Knappe Niederlage besitzt Wiederaufbaupfad.']
              },
              {
