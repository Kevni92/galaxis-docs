                results: ['Beschäftigungsfaktor', 'Qualifikationsmatrix', 'Umschulungsdauer und -kosten'],
                criteria: ['Normale Beschäftigung liegt bei 90 bis 98 Prozent.', 'Vollbeschäftigung ist nicht immer optimal.', 'Arbeitskraft wird nicht mehrfach angerechnet.']
              },
              {
