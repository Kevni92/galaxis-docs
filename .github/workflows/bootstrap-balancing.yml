                labels: ['balancing', 'baseline', 'pacing', 'needs-playtest'],
                goal: 'Beziehungsänderung, Vertragsbindung, Eskalationsfenster, Kriegsfortschritt und Friedenswerte auf langfristige glaubwürdige Interaktion abstimmen.',
                sources: ['balancing/domains/diplomacy-events-and-endgame.md'],
                results: ['Beziehungs- und Vertrauenskorridore', 'Vertragsfristen', 'Kriegsdauer und Friedensbewertung'],
                criteria: ['Begrenzter Krieg dauert typischerweise 5 bis 14 Tage.', 'Schwere Eskalation ist mindestens 24 Stunden erkennbar.', 'Vertragsbruch besitzt langfristige Kosten.']
              },
              {
