name: Bootstrap balancing roadmap

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-balancing.yml

permissions:
  contents: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Create balancing structure
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function readFile(path) {
              try {
                const response = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                if (Array.isArray(response.data)) throw new Error(`${path} is a directory`);
                return {
                  sha: response.data.sha,
                  content: Buffer.from(response.data.content, 'base64').toString('utf8')
                };
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
            }

            async function writeFile(path, content, message) {
              const existing = await readFile(path);
              if (existing && existing.content === content) return;
              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path,
                branch: 'main',
                message,
                content: Buffer.from(content).toString('base64'),
                ...(existing ? { sha: existing.sha } : {})
              });
            }

            async function patchFile(path, transform, message) {
              const existing = await readFile(path);
              if (!existing) throw new Error(`Missing file: ${path}`);
              const updated = transform(existing.content);
              if (updated !== existing.content) await writeFile(path, updated, message);
            }

            const labels = [
              ['balancing', '0E8A16', 'Numerische Werte, Formeln und Kataloge'],
              ['pacing', 'FBCA04', 'Zeitlicher Kampagnen- und Fortschrittsbogen'],
              ['simulation', '5319E7', 'Automatisierte deterministische Simulationsprüfung'],
              ['needs-playtest', 'D93F0B', 'Benötigt subjektive Prüfung im Playtest'],
              ['needs-data', 'C5DEF5', 'Benötigt Messdaten oder größere Vergleichsläufe'],
              ['baseline', '1D76DB', 'Erste verbindliche Implementierungsbaseline'],
              ['metrics', 'BFDADC', 'Metriken, Berichte und Qualitätsgrenzen'],
              ['release-balancing', 'B60205', 'Freigabe und Freeze einer Release-Balancingversion']
            ];

            for (const [name, color, description] of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
                await github.rest.issues.updateLabel({ owner, repo, name, new_name: name, color, description });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }

            const milestoneDefinitions = [
              {
                title: 'B1 – MVP-Baseline-Balancing',
                description: 'Vollständige erste Zahlenbasis, Datenstruktur, Validator und ausführbare Referenzszenarien für alle MVP-Systeme.'
              },
              {
                title: 'B2 – Automatisierte Simulationsprüfung',
                description: 'Headless-Simulation, Strategieprofile, Metrikberichte, Regression-Schwellen und Nachtläufe.'
              },
              {
                title: 'B3 – Playtest-Balancing',
                description: 'Spielgefühl, Verständlichkeit, Informationslast, Pacing und strategische Vielfalt mit echten Spielsitzungen validieren.'
              },
              {
                title: 'B4 – Release-Balancing',
                description: 'Release-Szenariomatrix, Exploitprüfung, Savegame-Kompatibilität und Freeze der ersten Release-Balancingversion.'
              }
            ];

            const existingMilestones = await github.paginate(github.rest.issues.listMilestones, {
              owner, repo, state: 'all', per_page: 100
            });
            const milestones = {};
            for (const definition of milestoneDefinitions) {
              let milestone = existingMilestones.find(item => item.title === definition.title);
              if (!milestone) {
                const created = await github.rest.issues.createMilestone({ owner, repo, ...definition });
                milestone = created.data;
              } else if (milestone.description !== definition.description || milestone.state !== 'open') {
                const updated = await github.rest.issues.updateMilestone({
                  owner, repo, milestone_number: milestone.number,
                  description: definition.description, state: 'open'
                });
                milestone = updated.data;
              }
              milestones[definition.title] = milestone;
            }

            const issues = [
              {
                title: '[BAL] Systemweite Pacing-Ziele mit Standard-Zeitprofil kalibrieren',
                milestone: 'B1 – MVP-Baseline-Balancing',
                labels: ['balancing', 'pacing', 'baseline', 'needs-data'],
                goal: 'Die realen Zielzeiten aus der Baseline in konkrete Kampagnenzeitfaktoren und Dauerparameter übersetzen.',
                sources: ['balancing/baseline.md', 'balancing/domains/campaign-pacing.md'],
                results: ['Standard-Zeitprofil', 'Umrechnung realer Zielzeiten in Kampagnenzeit', 'Pacingbericht für Woche 1 bis 12'],
                criteria: ['Frühes, mittleres und spätes Szenario liegen grundsätzlich im Zielkorridor.', 'Pause und Offline-Nachholung verwenden dieselben Zeitwerte.', 'Alle Parameter besitzen Einheit und Version.']
              },
              {
                title: '[BAL] Galaxiegröße, Systemdichte und Startabstände kalibrieren',
                milestone: 'B1 – MVP-Baseline-Balancing',
                labels: ['balancing', 'baseline', 'simulation'],
                goal: 'Generierungsparameter so festlegen, dass Erkundung, Expansion, Erstkontakt und regionale Konkurrenz zum Kampagnenbogen passen.',
                sources: ['docs/02-galaxy/', 'balancing/baseline.md'],
                results: ['Größenprofile', 'System- und Verbindungskorridore', 'Startabstands- und Erreichbarkeitsregeln'],
                criteria: ['Erste Kontakte liegen im Zielkorridor.', 'Startpositionen besitzen mehrere tragfähige Expansionsrichtungen.', 'Seedgleiche Generierung ist reproduzierbar.']
              },
              {
                title: '[BAL] Planeteneigenschaften und Koloniegründung kalibrieren',
                milestone: 'B1 – MVP-Baseline-Balancing',
                labels: ['balancing', 'baseline', 'pacing'],
                goal: 'Planetengrößen, Bewohnbarkeit, Koloniekosten, Aufbauzeiten und Verwaltung so kalibrieren, dass Kolonisierung eine bedeutende Investition bleibt.',
                sources: ['balancing/domains/planets-and-colonies.md', 'balancing/scenarios/s02-expansion-vs-konsolidierung.md'],
                results: ['Planetenkapazitätskurven', 'Koloniegründungskosten', 'Aufbauphasen und Verwaltungsüberlastung'],
                criteria: ['Erste Kolonie wird typischerweise Tag 3 bis 6 beauftragt.', 'Expansion und Konsolidierung bleiben beide tragfähig.', 'Neue Kolonien sind nicht sofort vollständig produktiv.']
              },
              {
                title: '[BAL] Bevölkerungswachstum und Migration kalibrieren',
                milestone: 'B1 – MVP-Baseline-Balancing',
                labels: ['balancing', 'baseline', 'simulation'],
                goal: 'Natürliches Wachstum, Migration, Kapazitätsgrenzen und Mangelfolgen auf die zwölfwöchige Kampagne abstimmen.',
                sources: ['balancing/domains/population-and-employment.md'],
                results: ['Wachstumsraten', 'Migrationsgrenzen', 'Mangellast- und Erholungskurven'],
                criteria: ['Migration erhält Gesamtbevölkerung.', 'Etablierte Kolonien wachsen im Zielkorridor.', 'Kritischer Mangel wirkt ernst, aber nicht ohne Vorwarnung.']
              },
