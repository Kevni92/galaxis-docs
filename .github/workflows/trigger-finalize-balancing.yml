name: Trigger balancing documentation finalization

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/trigger-finalize-balancing.yml

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = '.github/workflows/finalize-balancing-docs.yml';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            const text = Buffer.from(current.data.content, 'base64').toString('utf8');
            const marker = `\n# trigger ${Date.now()}\n`;
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch: 'main', sha: current.data.sha,
              message: 'chore: run balancing documentation finalization',
              content: Buffer.from(text.replace(/\n# trigger \d+\n$/, '') + marker).toString('base64')
            });